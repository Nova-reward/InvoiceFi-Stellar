version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# InvoiceFi-Stellar – Local / Staging Docker Compose
#
# Services:
#   postgres          – PostgreSQL 15 database
#   redis             – Redis for BullMQ job queue
#   stellar-standalone – Stellar Quickstart (standalone / local network)
#   backend           – NestJS API (port 4000)
#   frontend          – Next.js 14 (port 3000)
#
# Usage:
#   Start:  docker compose up --build
#   Stop:   docker compose down
#   Purge:  docker compose down -v   (removes all volumes)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: invoicefi_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-invoicefi}
      POSTGRES_USER:     ${POSTGRES_USER:-invoicefi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-invoicefi_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invoicefi} -d ${POSTGRES_DB:-invoicefi}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - invoicefi_net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: invoicefi_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - invoicefi_net

  # ── Stellar Standalone Node ─────────────────────────────────────────────────
  stellar-standalone:
    image: stellar/quickstart:latest
    container_name: invoicefi_stellar
    restart: unless-stopped
    command: --standalone --enable-soroban-rpc
    environment:
      NETWORK_PASSPHRASE: "Standalone Network ; February 2017"
    ports:
      - "8000:8000"   # Horizon API
      - "8001:8001"   # Soroban RPC
    volumes:
      - stellar_data:/opt/stellar
    networks:
      - invoicefi_net

  # ── NestJS Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: invoicefi_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV:          ${NODE_ENV:-development}
      DATABASE_URL:      postgresql://${POSTGRES_USER:-invoicefi}:${POSTGRES_PASSWORD:-invoicefi_secret}@postgres:5432/${POSTGRES_DB:-invoicefi}
      STELLAR_RPC_URL:   http://stellar-standalone:8001
      HORIZON_URL:       http://stellar-standalone:8000
      PORT:              4000
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      SMTP_HOST:         ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:         ${SMTP_PORT:-587}
      SMTP_SECURE:       ${SMTP_SECURE:-false}
      SMTP_USER:         ${SMTP_USER}
      SMTP_PASSWORD:     ${SMTP_PASSWORD}
      SMTP_FROM:         ${SMTP_FROM:-noreply@invoicefi.com}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - invoicefi_net

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: invoicefi_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV:               ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL:    http://backend:4000
      NEXT_PUBLIC_HORIZON_URL: http://stellar-standalone:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - invoicefi_net

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  stellar_data:
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────────────────────
networks:
  invoicefi_net:
    driver: bridge
